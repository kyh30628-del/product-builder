<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Issues & Facts Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Global Issues & Facts Dashboard</h1>
            <div class="theme-toggle">
                <button id="theme-btn">Dark Mode</button>
            </div>
        </div>
        <p class="subtitle">Accurate, fact-based socio-economic indicators from the World Bank.</p>
    </header>

    <main class="container">
        <div id="data-grid" class="data-grid">
            <!-- Data cards will be injected here by JavaScript -->
            <div class="loading-state">Loading global data...</div>
        </div>
    </main>

    <footer>
        <p>Source: <a href="https://data.worldbank.org/" target="_blank">World Bank Open Data</a></p>
        <p>Accuracy is prioritized. Showing latest available factual records.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
